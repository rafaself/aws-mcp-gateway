name: Connector Smoke

on:
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:connector-contract

  deployed-smoke:
    runs-on: ubuntu-latest
    needs: contract
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deployed connector smoke (optional)
        env:
          AWS_MCP_GATEWAY_SMOKE_QUIET: "1"
          AWS_MCP_GATEWAY_WORKER_URL: ${{ secrets.AWS_MCP_GATEWAY_WORKER_URL }}
          AWS_MCP_GATEWAY_OAUTH_TOKEN_URL: ${{ secrets.AWS_MCP_GATEWAY_OAUTH_TOKEN_URL }}
          AWS_MCP_GATEWAY_OAUTH_CLIENT_ID: ${{ secrets.AWS_MCP_GATEWAY_OAUTH_CLIENT_ID }}
          AWS_MCP_GATEWAY_OAUTH_CLIENT_SECRET: ${{ secrets.AWS_MCP_GATEWAY_OAUTH_CLIENT_SECRET }}
          AWS_MCP_GATEWAY_OAUTH_AUDIENCE: ${{ secrets.AWS_MCP_GATEWAY_OAUTH_AUDIENCE }}
          AWS_MCP_GATEWAY_OAUTH_SCOPE: ${{ secrets.AWS_MCP_GATEWAY_OAUTH_SCOPE }}
          AWS_MCP_GATEWAY_SMOKE_REGION: ${{ secrets.AWS_MCP_GATEWAY_SMOKE_REGION }}
        run: |
          if [[ -z "${AWS_MCP_GATEWAY_WORKER_URL}" || -z "${AWS_MCP_GATEWAY_OAUTH_TOKEN_URL}" || -z "${AWS_MCP_GATEWAY_OAUTH_CLIENT_ID}" || -z "${AWS_MCP_GATEWAY_OAUTH_CLIENT_SECRET}" ]]; then
            echo "Skipping deployed connector smoke check because required secrets are not configured."
            exit 0
          fi
          pnpm run verify:oauth:authenticated
